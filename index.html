<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スロットゲーム</title>

<style>
body {
    text-align: center;
    font-family: sans-serif;
    background: #222;
    color: white;
}

h1 {
    margin-top: 20px;
}

#reels {
    display: flex;
    justify-content: center;
    margin: 30px 0;
}

.reel {
    width: 80px;
    height: 80px;
    margin: 10px;
    font-size: 40px;
    line-height: 80px;
    background: white;
    color: black;
    border-radius: 10px;
}

button {
    font-size: 20px;
    padding: 10px 30px;
    margin-top: 20px;
}

#message {
    margin-top: 20px;
    height: 30px;
}

</style>
</head>

<body>

<h1>🎰 スロットゲーム</h1>

<div>所持コイン: <span id="coins">100</span></div>

<div id="reels">
    <div class="reel" id="r1">🍒</div>
    <div class="reel" id="r2">🍋</div>
    <div class="reel" id="r3">🔔</div>
</div>

<button id="spinBtn">スタート</button>

<div id="message"></div>

<script>

const symbols = ["7️⃣","🍒","🔔","🍋","🍇","🍉"];

let coins = 100;
let spinning = false;
let intervals = [];

// 表示更新
function updateCoins() {
    document.getElementById("coins").textContent = coins;
}

// ランダムシンボル
function getRandomSymbol() {
    return symbols[Math.floor(Math.random() * symbols.length)];
}

// リール回転
function startSpin() {
    if (coins < 10) {
        document.getElementById("message").textContent = "コイン不足！";
        return;
    }

    coins -= 10;
    updateCoins();
    document.getElementById("message").textContent = "";

    spinning = true;
    document.getElementById("spinBtn").textContent = "ストップ";

    intervals = [
        setInterval(() => r1.textContent = getRandomSymbol(), 100),
        setInterval(() => r2.textContent = getRandomSymbol(), 100),
        setInterval(() => r3.textContent = getRandomSymbol(), 100),
    ];
}

// 停止
function stopSpin() {
    intervals.forEach(clearInterval);
    spinning = false;
    document.getElementById("spinBtn").textContent = "スタート";

    checkResult();
}

// 役判定
function checkResult() {
    const r1 = document.getElementById("r1").textContent;
    const r2 = document.getElementById("r2").textContent;
    const r3 = document.getElementById("r3").textContent;

    let payout = 0;
    let message = "";

    if (r1 === "7️⃣" && r2 === "7️⃣" && r3 === "7️⃣") {
        payout = 100;
        message = "🎉 777！大当たり！";
    }
    else if (r1 === r2 && r2 === r3) {
        payout = 50;
        message = "✨ 3つ揃い！";
    }
    else if (r1 === "🍒" || r2 === "🍒" || r3 === "🍒") {
        payout = 10;
        message = "🍒 チェリー！";
    }

    coins += payout;
    updateCoins();

    document.getElementById("message").textContent =
        message + (payout > 0 ? " +" + payout + "枚" : " ハズレ");
}

// ボタン
document.getElementById("spinBtn").addEventListener("click", () => {
    if (!spinning) {
        startSpin();
    } else {
        stopSpin();
    }
});

</script>

</body>
</html>
