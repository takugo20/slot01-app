<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スロット</title>

<style>
body {
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#info {
    font-size:20px;
    margin:10px;
}

#reels {
    display:flex;
    justify-content:center;
    margin:20px;
}

.reel-container {
    margin:0 10px;
}

.reel {
    width:80px;
    height:80px;
    overflow:hidden;
    border-radius:10px;
    background:white;
    position:relative;
}

.inner {
    position:absolute;
    width:100%;
}

.symbol {
    width:80px;
    height:80px;
    line-height:80px;
    font-size:40px;
}

.flash {
    animation: flash 0.3s infinite;
}
@keyframes flash {
    0%{background:#111;}
    50%{background:#500;}
    100%{background:#111;}
}

table {
    margin:20px auto;
    border-collapse:collapse;
}
td,th {
    border:1px solid white;
    padding:8px 12px;
}

.symbol-row {
    font-size:30px;
}
</style>
</head>

<body>

<h1>🎰 SLOT</h1>

<div id="info">
CREDIT: <span id="credit">1000</span>
PAYOUT: <span id="payout">0</span>
</div>

<button onclick="start()">START</button>

<div id="reels">
    <div class="reel-container">
        <div class="reel"><div class="inner" id="r1"></div></div>
        <button onclick="stopReel(0)">STOP</button>
    </div>
    <div class="reel-container">
        <div class="reel"><div class="inner" id="r2"></div></div>
        <button onclick="stopReel(1)">STOP</button>
    </div>
    <div class="reel-container">
        <div class="reel"><div class="inner" id="r3"></div></div>
        <button onclick="stopReel(2)">STOP</button>
    </div>
</div>

<h3>役一覧 / PAYOUT</h3>
<table>
<tr><th>役</th><th>PAYOUT</th></tr>
<tr><td class="symbol-row">7️⃣ 7️⃣ 7️⃣</td><td>5000</td></tr>
<tr><td class="symbol-row">🍒 🍒 🍒</td><td>2000</td></tr>
<tr><td class="symbol-row">🍋 🍋 🍋</td><td>1000</td></tr>
<tr><td class="symbol-row">🍇 🍇 🍇</td><td>500</td></tr>
<tr><td class="symbol-row">🔔 🔔 🔔</td><td>100</td></tr>
<tr><td class="symbol-row">🍒 🍒</td><td>50</td></tr>
<tr><td class="symbol-row">🍒</td><td>20</td></tr>
</table>

<script>
const symbols = ["7️⃣","🍒","🍋","🍇","🔔"];

let credit = Number(localStorage.getItem("credit")) || 1000;
let payout = 0;

let spinning=false;
let reels=[];

document.getElementById("credit").textContent=credit;

// リール生成
function initReel(id){
    const el=document.getElementById(id);
    el.innerHTML="";
    for(let i=0;i<20;i++){
        const d=document.createElement("div");
        d.className="symbol";
        d.textContent=symbols[i % symbols.length];
        el.appendChild(d);
    }
}

["r1","r2","r3"].forEach(initReel);

// 状態
for(let i=0;i<3;i++){
    reels.push({
        pos:0,
        speed:0,
        stopping:false,
        result:""
    });
}

// 音
function sound(f1,f2){
    const ctx=new AudioContext();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);

    o.frequency.setValueAtTime(f1,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f2,ctx.currentTime+0.2);

    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);

    o.start();
    o.stop(ctx.currentTime+0.2);
}

// アニメーション
function animate(){
    reels.forEach((r,i)=>{
        if(!spinning) return;

        if(r.speed>0){
            r.pos += r.speed;

            if(r.stopping){
                r.speed *= 0.96;

                if(r.speed < 1){
                    r.speed = 0;

                    r.pos = r.pos % 400;
                    r.pos = Math.round(r.pos / 80) * 80;

                    const reel=document.getElementById("r"+(i+1));
                    reel.style.transform="translateY(-"+r.pos+"px)";

                    // ★修正ポイント
                    const index = (Math.floor(r.pos/80)) % 20;
                    r.result = symbols[index % symbols.length];
                }
            }

            document.getElementById("r"+(i+1)).style.transform=
                "translateY(-"+r.pos+"px)";
        }
    });

    requestAnimationFrame(animate);
}
animate();

// スタート
function start(){
    if(spinning) return;
    if(credit<10){
        alert("コイン不足");
        return;
    }

    credit-=10;
    payout=0;
    update();

    spinning=true;

    reels.forEach(r=>{
        r.speed=20;
        r.stopping=false;
        r.result="";
    });

    sound(200,800);
}

// 停止
function stopReel(i){
    const r = reels[i];
    if(!spinning || r.stopping) return;

    r.stopping = true;

    sound(800,200);

    checkReach();

    if(reels.every(r=>r.stopping)){
        setTimeout(()=>{
            spinning=false;
            judge();
        },500);
    }
}

// リーチ
function checkReach(){
    const results = reels.map(r=>r.result).filter(x=>x);
    if(results.length>=2 && results[0]===results[1]){
        document.body.classList.add("flash");
        setTimeout(()=>document.body.classList.remove("flash"),800);
    }
}

// 判定
function judge(){
    const [a,b,c]=reels.map(r=>r.result);
    let p=0;

    const cherry=[a,b,c].filter(x=>x==="🍒").length;

    if(a==="7️⃣"&&b==="7️⃣"&&c==="7️⃣") p=5000;
    else if(cherry===3) p=2000;
    else if(a==="🍋"&&b==="🍋"&&c==="🍋") p=1000;
    else if(a==="🍇"&&b==="🍇"&&c==="🍇") p=500;
    else if(a==="🔔"&&b==="🔔"&&c==="🔔") p=100;
    else if(cherry===2) p=50;
    else if(cherry===1) p=20;

    payout=p;
    credit+=p;

    update();

    if(p>0) sound(300,1200);
}

// 更新
function update(){
    document.getElementById("credit").textContent=credit;
    document.getElementById("payout").textContent=payout;
    localStorage.setItem("credit",credit);
}
</script>

</body>
</html>
