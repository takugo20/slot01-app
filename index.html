<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スロット</title>

<style>
body {
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#info {
    font-size:20px;
    margin:10px;
}

#reels {
    display:flex;
    justify-content:center;
    margin:20px;
}

.reel-container {
    margin:0 10px;
}

.reel {
    width:80px;
    height:80px;
    overflow:hidden;
    border-radius:10px;
    background:white;
    position:relative;
}

.inner {
    position:absolute;
    width:100%;
}

.symbol {
    width:80px;
    height:80px;
    line-height:80px;
    font-size:40px;
}

button {
    margin-top:5px;
}

.flash {
    animation: flash 0.3s infinite;
}

@keyframes flash {
    0%{background:#fff;}
    50%{background:#f00;}
    100%{background:#fff;}
}
</style>
</head>

<body>

<h1>🎰 SLOT</h1>

<div id="info">
CREDIT: <span id="credit">1000</span>
PAYOUT: <span id="payout">0</span>
</div>

<button onclick="start()">START</button>

<div id="reels">
    <div class="reel-container">
        <div class="reel"><div class="inner" id="r1"></div></div>
        <button onclick="stopReel(0)">STOP</button>
    </div>
    <div class="reel-container">
        <div class="reel"><div class="inner" id="r2"></div></div>
        <button onclick="stopReel(1)">STOP</button>
    </div>
    <div class="reel-container">
        <div class="reel"><div class="inner" id="r3"></div></div>
        <button onclick="stopReel(2)">STOP</button>
    </div>
</div>

<div id="message"></div>

<script>
const symbols = ["7️⃣","🔔","🍋","🍇","🍉","🍒"];

let credit = Number(localStorage.getItem("credit")) || 1000;
let payout = 0;

let spinning=false;
let intervals=[];
let results=["","",""];
let stopped=[false,false,false];

document.getElementById("credit").textContent=credit;

// 初期リール
function init(){
    ["r1","r2","r3"].forEach(id=>{
        const el=document.getElementById(id);
        el.innerHTML="";
        symbols.forEach(s=>{
            const d=document.createElement("div");
            d.className="symbol";
            d.textContent=s;
            el.appendChild(d);
        });
    });
}
init();

// 豪華音
function sound(freq1,freq2){
    const ctx=new AudioContext();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.frequency.setValueAtTime(freq1,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq2,ctx.currentTime+0.2);

    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);

    osc.start();
    osc.stop(ctx.currentTime+0.2);
}

// スタート
function start(){
    if(spinning) return;
    if(credit<10){
        alert("コイン不足");
        return;
    }

    credit-=10;
    payout=0;
    update();

    spinning=true;
    stopped=[false,false,false];
    results=["","",""];

    intervals = [0,1,2].map(i=>{
        let pos=0;
        return setInterval(()=>{
            pos+=20;
            document.getElementById("r"+(i+1)).style.transform=
                "translateY("+(pos%480)+"px)";
        },50);
    });

    sound(200,800);
}

// 停止
function stopReel(i){
    if(!spinning || stopped[i]) return;

    clearInterval(intervals[i]);

    const result = symbols[Math.floor(Math.random()*symbols.length)];
    results[i]=result;

    const reel=document.getElementById("r"+(i+1));

    // 中央にピタッと配置
    reel.style.transform="translateY(0)";
    reel.children[0].textContent=result;

    stopped[i]=true;

    sound(800,200);

    checkReach();

    if(stopped.every(v=>v)){
        spinning=false;
        judge();
    }
}

// リーチ演出
function checkReach(){
    const [a,b,c]=results.filter(x=>x!=="");

    if(results.filter(x=>x!=="").length>=2){
        if(a===b){
            document.body.classList.add("flash");
            setTimeout(()=>document.body.classList.remove("flash"),1000);
        }
    }
}

// 判定
function judge(){
    const [a,b,c]=results;
    let p=0;

    const cherryCount=[a,b,c].filter(x=>x==="🍒").length;

    if(a==="7️⃣"&&b==="7️⃣"&&c==="7️⃣") p=5000;
    else if(a==="🔔"&&b==="🔔"&&c==="🔔") p=300;
    else if(a==="🍋"&&b==="🍋"&&c==="🍋") p=200;
    else if(a==="🍇"&&b==="🍇"&&c==="🍇") p=180;
    else if(a==="🍉"&&b==="🍉"&&c==="🍉") p=150;
    else if(cherryCount===3) p=100;
    else if(cherryCount===2) p=30;
    else if(cherryCount===1) p=10;

    payout=p;
    credit+=p;

    update();

    if(p>0) sound(300,1200);
}

// 更新
function update(){
    document.getElementById("credit").textContent=credit;
    document.getElementById("payout").textContent=payout;
    localStorage.setItem("credit",credit);
}
</script>

</body>
</html>
