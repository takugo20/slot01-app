<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スロット 完全修正版</title>

<style>
body { background:#111; color:white; text-align:center; font-family:sans-serif; }
#reels { display:flex; justify-content:center; margin:20px; }
.reel { width:80px; height:80px; overflow:hidden; background:white; margin:0 10px; border-radius:10px;}
.symbol { height:80px; line-height:80px; font-size:40px; }
button { margin:5px; }
</style>
</head>

<body>

<h1>🎰 SLOT</h1>

<div>
CREDIT: <span id="credit">1000</span>
PAYOUT: <span id="payout">0</span>
</div>

<button onclick="start()">START</button>

<div id="reels">
  <div>
    <div class="reel"><div id="r0"></div></div>
    <button onclick="stopReel(0)">STOP</button>
  </div>
  <div>
    <div class="reel"><div id="r1"></div></div>
    <button onclick="stopReel(1)">STOP</button>
  </div>
  <div>
    <div class="reel"><div id="r2"></div></div>
    <button onclick="stopReel(2)">STOP</button>
  </div>
</div>

<script>
const symbols = ["7️⃣","🍒","🍋","🍇","🔔"];
const SIZE = 80;
const REEL_COUNT = 20;
const LOOP = SIZE * REEL_COUNT;

let credit = Number(localStorage.getItem("credit")) || 1000;
let payout = 0;
let spinning = false;

document.getElementById("credit").textContent = credit;

// リール状態
const reels = Array.from({length:3}, () => ({
  pos:0, speed:0, state:"idle", target:0, result:""
}));

// リール配列を保存（重要）
const reelArrays = [];

// 初期化
function init(){
  for(let i=0;i<3;i++){
    const el = document.getElementById("r"+i);
    const arr = [];

    for(let j=0;j<REEL_COUNT;j++){
      const sym = symbols[j % symbols.length];
      arr.push(sym);

      const d=document.createElement("div");
      d.className="symbol";
      d.textContent = sym;
      el.appendChild(d);
    }

    reelArrays.push(arr);
  }
}
init();

// 効果音
function sound(f1,f2){
  const ctx=new AudioContext();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.setValueAtTime(f1,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(f2,ctx.currentTime+0.2);
  g.gain.setValueAtTime(0.3,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
  o.start(); o.stop(ctx.currentTime+0.2);
}

// 内部抽選
function lottery(){
  const r = Math.random();

  if(r < 0.001) return ["7️⃣","7️⃣","7️⃣"];
  if(r < 0.01) return ["🍋","🍋","🍋"];
  if(r < 0.05) return ["🍇","🍇","🍇"];

  return ["🍒","🍋","🍇"];
}

let targetResult = [];

// アニメーション
function loop(){
  reels.forEach((r,i)=>{
    if(r.state==="idle"||r.state==="stopped") return;

    r.pos += r.speed;
    r.pos %= LOOP;

    if(r.state==="stopping"){
      r.speed *= 0.92;

      if(Math.abs(r.pos - r.target) < r.speed){
        r.pos = r.target;
        r.speed = 0;
        r.state = "stopped";
        r.result = targetResult[i];
      }
    }

    document.getElementById("r"+i).style.transform =
      "translateY(-"+r.pos+"px)";
  });

  requestAnimationFrame(loop);
}
loop();

// スタート
function start(){
  if(spinning) return;
  if(credit < 10){
    alert("コイン不足");
    return;
  }

  credit -= 10;
  payout = 0;
  update();

  spinning = true;
  targetResult = lottery();

  reels.forEach(r=>{
    r.speed = 20;
    r.state = "spinning";
  });

  sound(200,800);
}

// ★完全修正ポイント
function stopReel(i){
  const r = reels[i];
  if(r.state !== "spinning") return;

  r.state = "stopping";

  const arr = reelArrays[i];
  const targetSymbol = targetResult[i];

  // ★配列から正しい位置を探す
  let index = arr.indexOf(targetSymbol);

  // 見つからない場合（安全対策）
  if(index === -1) index = 0;

  r.target = index * SIZE;

  sound(800,200);

  if(reels.every(r=>r.state!=="spinning")){
    setTimeout(()=>{
      spinning = false;
      judge();
    },600);
  }
}

// 判定
function judge(){
  const [a,b,c] = targetResult;

  let p = 0;

  if(a==="7️⃣"&&b==="7️⃣"&&c==="7️⃣") p=5000;
  else if(a==="🍋"&&b==="🍋"&&c==="🍋") p=1000;
  else if(a==="🍇"&&b==="🍇"&&c==="🍇") p=500;

  payout = p;
  credit += p;

  update();

  if(p>0) sound(300,1200);
}

// 更新
function update(){
  document.getElementById("credit").textContent = credit;
  document.getElementById("payout").textContent = payout;
  localStorage.setItem("credit", credit);
}
</script>

</body>
</html>
