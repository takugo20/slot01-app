<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スロット（設定付き）</title>

<style>
body { background:#111; color:white; text-align:center; font-family:sans-serif; }
#info { font-size:20px; margin:10px; }
#reels { display:flex; justify-content:center; margin:20px; }
.reel { width:80px; height:80px; overflow:hidden; background:white; margin:0 10px; border-radius:10px;}
.symbol { height:80px; line-height:80px; font-size:40px; }
button { margin:5px; }
table { margin:20px auto; border-collapse:collapse; }
td,th { border:1px solid white; padding:8px 12px; }
.symbol-row { font-size:30px; }
</style>
</head>

<body>

<h1>🎰 SLOT（設定付き）</h1>

<div id="info">
CREDIT: <span id="credit">1000</span>　
PAYOUT: <span id="payout">0</span><br>
設定: <span id="setting">6</span>
</div>

<div>
<button onclick="setSetting(1)">1</button>
<button onclick="setSetting(2)">2</button>
<button onclick="setSetting(3)">3</button>
<button onclick="setSetting(4)">4</button>
<button onclick="setSetting(5)">5</button>
<button onclick="setSetting(6)">6</button>
</div>

<button onclick="start()">START</button>

<div id="reels">
  <div>
    <div class="reel"><div id="r0"></div></div>
    <button onclick="stopReel(0)">STOP</button>
  </div>
  <div>
    <div class="reel"><div id="r1"></div></div>
    <button onclick="stopReel(1)">STOP</button>
  </div>
  <div>
    <div class="reel"><div id="r2"></div></div>
    <button onclick="stopReel(2)">STOP</button>
  </div>
</div>

<h3>役一覧 / PAYOUT</h3>
<table>
<tr><th>役</th><th>PAYOUT</th></tr>
<tr><td class="symbol-row">7️⃣ 7️⃣ 7️⃣</td><td>5000</td></tr>
<tr><td class="symbol-row">🍒 🍒 🍒</td><td>2000</td></tr>
<tr><td class="symbol-row">🍋 🍋 🍋</td><td>1000</td></tr>
<tr><td class="symbol-row">🍇 🍇 🍇</td><td>500</td></tr>
<tr><td class="symbol-row">🔔 🔔 🔔</td><td>100</td></tr>
<tr><td class="symbol-row">🍒 🍒</td><td>50</td></tr>
<tr><td class="symbol-row">🍒</td><td>20</td></tr>
</table>

<script>
const symbols = ["7️⃣","🍒","🍋","🍇","🔔"];
const SIZE = 80;
const LOOP = 1600;

let credit = Number(localStorage.getItem("credit")) || 1000;
let payout = 0;
let spinning = false;
let setting = 6;

document.getElementById("credit").textContent = credit;
document.getElementById("setting").textContent = setting;

// 設定変更
function setSetting(s){
  setting = s;
  document.getElementById("setting").textContent = s;
}

// リール状態
const reels = Array.from({length:3}, () => ({
  pos:0, speed:0, state:"idle", target:0, result:""
}));

// 初期表示
function init(){
  reels.forEach((_,i)=>{
    const el = document.getElementById("r"+i);
    for(let j=0;j<20;j++){
      const d=document.createElement("div");
      d.className="symbol";
      d.textContent = symbols[j % symbols.length];
      el.appendChild(d);
    }
  });
}
init();

// 効果音
function sound(f1,f2){
  const ctx=new AudioContext();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.setValueAtTime(f1,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(f2,ctx.currentTime+0.2);
  g.gain.setValueAtTime(0.3,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
  o.start(); o.stop(ctx.currentTime+0.2);
}

// ★追加：ループ距離計算
function getDistance(a,b){
  let d = Math.abs(a - b);
  return Math.min(d, LOOP - d);
}

// 設定倍率
function getRate(){
  return {1:0.7,2:0.9,3:1.1,4:1.3,5:1.6,6:2.0}[setting];
}

// 内部抽選
function lottery(){
  const rate = getRate();
  const r = Math.random();

  if(r < 0.001 * rate) return ["7️⃣","7️⃣","7️⃣"];
  if(r < 0.004 * rate) return ["🍒","🍒","🍒"];
  if(r < 0.009 * rate) return ["🍋","🍋","🍋"];
  if(r < 0.019 * rate) return ["🍇","🍇","🍇"];
  if(r < 0.069 * rate) return ["🔔","🔔","🔔"];

  if(r < 0.169 * rate){
    return ["🍒","🍒", randomNonCherry()];
  }

  if(r < 0.369 * rate){
    return ["🍒", randomNonCherry(), randomNonCherry()];
  }

  return [
    randomNonCherry(),
    randomNonCherry(),
    randomNonCherry()
  ];
}

function randomNonCherry(){
  return ["🍋","🍇","🔔","7️⃣"][Math.floor(Math.random()*4)];
}

let targetResult = [];

// アニメーション
function loop(){
  reels.forEach((r,i)=>{
    if(r.state==="idle"||r.state==="stopped") return;

    r.pos += r.speed;
    r.pos %= LOOP;

    if(r.state==="stopping"){
      r.speed *= 0.95;

      // ★ここが修正
      if(getDistance(r.pos, r.target) < r.speed){
        r.pos = r.target;
        r.speed = 0;
        r.state = "stopped";
        r.result = targetResult[i];
      }
    }

    document.getElementById("r"+i).style.transform =
      "translateY(-"+r.pos+"px)";
  });

  requestAnimationFrame(loop);
}
loop();

// スタート
function start(){
  if(spinning) return;
  if(credit < 10){
    alert("コイン不足");
    return;
  }

  credit -= 10;
  payout = 0;
  update();

  spinning = true;
  targetResult = lottery();

  reels.forEach(r=>{
    r.speed = 20;
    r.state = "spinning";
  });

  sound(200,800);
}

// ストップ
function stopReel(i){
  const r = reels[i];
  if(r.state !== "spinning") return;

  r.state = "stopping";

  const index = symbols.indexOf(targetResult[i]);
  r.target = index * SIZE;

  sound(800,200);

  if(reels.every(r=>r.state!=="spinning")){
    setTimeout(()=>{
      spinning = false;
      judge();
    },600);
  }
}

// 判定
function judge(){
  const [a,b,c] = targetResult;

  let p = 0;
  const cherry = [a,b,c].filter(x=>x==="🍒").length;

  if(a==="7️⃣"&&b==="7️⃣"&&c==="7️⃣") p=5000;
  else if(cherry===3) p=2000;
  else if(a==="🍋"&&b==="🍋"&&c==="🍋") p=1000;
  else if(a==="🍇"&&b==="🍇"&&c==="🍇") p=500;
  else if(a==="🔔"&&b==="🔔"&&c==="🔔") p=100;
  else if(cherry===2) p=50;
  else if(cherry===1) p=20;

  payout = p;
  credit += p;
  update();

  if(p>0) sound(300,1200);
}

// 更新
function update(){
  document.getElementById("credit").textContent = credit;
  document.getElementById("payout").textContent = payout;
  localStorage.setItem("credit", credit);
}
</script>

</body>
</html>
