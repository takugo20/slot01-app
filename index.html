<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スロット 完成版</title>

<style>
body { background:#111; color:white; text-align:center; font-family:sans-serif; }
#info { margin:10px; font-size:20px; }
#reels { display:flex; justify-content:center; margin:20px; }
.reel {
  width:80px; height:80px;
  overflow:hidden;
  background:white;
  border-radius:10px;
  margin:0 10px;
}
.symbol {
  height:80px;
  line-height:80px;
  font-size:40px;
}
button { margin:5px; }
table { margin:20px auto; border-collapse:collapse; }
td,th { border:1px solid white; padding:8px 12px; }
.symbol-row { font-size:30px; }
</style>
</head>

<body>

<h1>🎰 SLOT（完成版）</h1>

<div id="info">
CREDIT: <span id="credit">1000</span>
PAYOUT: <span id="payout">0</span><br>
設定: <span id="setting">6</span>
</div>

<div>
<button onclick="setSetting(1)">1</button>
<button onclick="setSetting(2)">2</button>
<button onclick="setSetting(3)">3</button>
<button onclick="setSetting(4)">4</button>
<button onclick="setSetting(5)">5</button>
<button onclick="setSetting(6)">6</button>
</div>

<button onclick="start()">START</button>

<div id="reels">
  <div>
    <div class="reel"><div id="r0"></div></div>
    <button onclick="stopReel(0)">STOP</button>
  </div>
  <div>
    <div class="reel"><div id="r1"></div></div>
    <button onclick="stopReel(1)">STOP</button>
  </div>
  <div>
    <div class="reel"><div id="r2"></div></div>
    <button onclick="stopReel(2)">STOP</button>
  </div>
</div>

<h3>役一覧 / PAYOUT</h3>
<table>
<tr><th>役</th><th>PAYOUT</th></tr>
<tr><td class="symbol-row">7️⃣ 7️⃣ 7️⃣</td><td>5000</td></tr>
<tr><td class="symbol-row">🍒 🍒 🍒</td><td>2000</td></tr>
<tr><td class="symbol-row">🍋 🍋 🍋</td><td>1000</td></tr>
<tr><td class="symbol-row">🍇 🍇 🍇</td><td>500</td></tr>
<tr><td class="symbol-row">🔔 🔔 🔔</td><td>100</td></tr>
<tr><td class="symbol-row">🍒 🍒</td><td>50</td></tr>
<tr><td class="symbol-row">🍒</td><td>20</td></tr>
</table>

<script>
const symbols = ["7️⃣","🍒","🍋","🍇","🔔"];

let credit = Number(localStorage.getItem("credit")) || 1000;
let payout = 0;
let spinning = false;
let setting = 6;

document.getElementById("credit").textContent = credit;
document.getElementById("setting").textContent = setting;

// リール状態
const reels = Array.from({length:3}, () => ({
  pos:0,
  spinning:false
}));

// 初期化（絶対壊さない）
function init(){
  reels.forEach((_,i)=>{
    const el = document.getElementById("r"+i);
    el.innerHTML = "";
    for(let j=0;j<20;j++){
      const d=document.createElement("div");
      d.className="symbol";
      d.textContent = symbols[j % symbols.length];
      el.appendChild(d);
    }
  });
}
init();

// 効果音
function sound(f1,f2){
  const ctx=new AudioContext();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.setValueAtTime(f1,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(f2,ctx.currentTime+0.2);
  g.gain.setValueAtTime(0.3,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
  o.start(); o.stop(ctx.currentTime+0.2);
}

// 設定倍率
function getRate(){
  return {1:0.7,2:0.9,3:1.1,4:1.3,5:1.6,6:2.0}[setting];
}

// ランダム
function randomSymbol(){
  return symbols[Math.floor(Math.random()*symbols.length)];
}

// ハズレ専用
function randomLose(){
  let a,b,c;
  do {
    a = randomSymbol();
    b = randomSymbol();
    c = randomSymbol();
  } while (
    (a===b && b===c) ||
    ([a,b,c].filter(x=>x==="🍒").length >= 1)
  );
  return [a,b,c];
}

// 内部抽選
function lottery(){
  const r = Math.random() * getRate();

  if(r < 0.001) return ["7️⃣","7️⃣","7️⃣"];
  if(r < 0.004) return ["🍒","🍒","🍒"];
  if(r < 0.009) return ["🍋","🍋","🍋"];
  if(r < 0.019) return ["🍇","🍇","🍇"];
  if(r < 0.069) return ["🔔","🔔","🔔"];

  if(r < 0.169){
    return ["🍒","🍒", randomSymbol()];
  }

  if(r < 0.369){
    return ["🍒", randomSymbol(), randomSymbol()];
  }

  return randomLose();
}

let result = [];

// 回転
function loop(){
  reels.forEach((r,i)=>{
    if(!r.spinning) return;

    r.pos += 20;
    r.pos %= 1600;

    document.getElementById("r"+i).style.transform =
      "translateY(-"+r.pos+"px)";
  });

  requestAnimationFrame(loop);
}
loop();

// スタート
function start(){
  if(spinning) return;

  if(credit < 10){
    alert("コイン不足");
    return;
  }

  credit -= 10;
  payout = 0;
  update();

  spinning = true;
  result = lottery();

  reels.forEach(r=>{
    r.spinning = true;
  });

  sound(200,800);
}

// ★修正済みSTOP（ピタ止まり＆構造維持）
function stopReel(i){
  if(!spinning) return;

  const r = reels[i];
  if(!r.spinning) return;

  r.spinning = false;

  const symbol = result[i];
  const index = symbols.indexOf(symbol);

  r.pos = index * 80;

  const el = document.getElementById("r"+i);
  el.style.transform = "translateY(-"+r.pos+"px)";

  sound(800,200);

  if(reels.every(r=>!r.spinning)){
    spinning = false;
    judge();
  }
}

// 判定
function judge(){
  const [a,b,c] = result;

  let p = 0;
  const cherry = [a,b,c].filter(x=>x==="🍒").length;

  if(a==="7️⃣"&&b==="7️⃣"&&c==="7️⃣") p=5000;
  else if(cherry===3) p=2000;
  else if(a==="🍋"&&b==="🍋"&&c==="🍋") p=1000;
  else if(a==="🍇"&&b==="🍇"&&c==="🍇") p=500;
  else if(a==="🔔"&&b==="🔔"&&c==="🔔") p=100;
  else if(cherry===2) p=50;
  else if(cherry===1) p=20;

  payout = p;
  credit += p;

  update();

  if(p>0) sound(300,1200);
}

// 設定変更
function setSetting(s){
  setting = s;
  document.getElementById("setting").textContent = s;
}

// 更新
function update(){
  document.getElementById("credit").textContent = credit;
  document.getElementById("payout").textContent = payout;
  localStorage.setItem("credit", credit);
}
</script>

</body>
</html>
